configuration:
  # ── 필수 필드 (항상 표시) ──
  cgate_mode:
    name: C-Gate 모드
    description: >-
      C-Gate 제공 방식. "remote"는 네트워크의 다른 곳에서 실행 중인 C-Gate
      서버에 연결합니다 (가장 일반적). "managed"는 이 애드온 내에서 C-Gate를
      로컬로 다운로드하여 실행합니다.
  cgate_host:
    name: C-Gate 호스트 (필수)
    description: >-
      C-Gate 서버의 IP 주소 또는 호스트명. 원격 모드에서는 C-Gate를 실행하는
      머신의 주소를 입력하세요. 관리 모드에서는 127.0.0.1을 사용하세요.
  cgate_project:
    name: C-Gate 프로젝트 이름 (필수)
    description: >-
      C-Gate에서 구성된 C-Bus 프로젝트 이름 (예: HOME, MYHOUSE). C-Gate
      Toolkit의 프로젝트 트리에서 찾을 수 있습니다.
  ha_discovery_enabled:
    name: Home Assistant Discovery 활성화
    description: >-
      MQTT Discovery를 사용하여 C-Bus 장치를 Home Assistant에 자동으로
      등록합니다. 대부분의 사용자는 이것을 활성화 상태로 유지해야 합니다.
      수동 YAML 구성 없이 장치가 엔티티로 표시됩니다.
  log_level:
    name: 로그 수준
    description: >-
      로그 상세도. 정상 운영에는 "info", 연결 또는 검색 문제 해결에는
      "debug"를 사용하세요.

  # ── C-Gate 연결 (선택 사항, 합리적인 기본값 포함) ──
  cgate_port:
    name: C-Gate 명령 포트
    description: >-
      C-Gate 명령 연결을 위한 TCP 포트. C-Gate가 비표준 포트를 사용하는
      경우에만 변경하세요. 기본값: 20023.
  cgate_event_port:
    name: C-Gate 이벤트 포트
    description: >-
      C-Gate 이벤트 연결을 위한 TCP 포트. C-Gate가 비표준 포트를 사용하는
      경우에만 변경하세요. 기본값: 20025.

  # ── C-Gate 관리 모드 ──
  cgate_install_source:
    name: C-Gate 설치 소스
    description: >-
      관리 모드에서만 사용됩니다. "download"는 C-Gate를 자동으로
      다운로드합니다. "upload"는 /share/cgate/에 배치한 zip 파일을
      사용합니다.
  cgate_download_url:
    name: C-Gate 다운로드 URL
    description: >-
      다운로드 소스의 관리 모드에서만 사용됩니다. 공식 Clipsal 다운로드
      URL이 변경된 경우 재정의하세요. 기본 URL을 사용하려면 비워 두세요.
  cgate_download_sha256:
    name: C-Gate 다운로드 SHA256
    description: >-
      C-Gate 다운로드를 검증하기 위한 선택적 SHA256 체크섬. 사용자 지정
      다운로드 URL을 사용할 때 권장됩니다.

  # ── MQTT (보통 자동 감지) ──
  mqtt_host:
    name: MQTT 브로커 호스트
    description: >-
      Mosquitto 애드온에서 자동 감지됩니다 - 대부분의 사용자는 비워
      두어야 합니다. 외부 MQTT 브로커를 사용하는 경우에만 설정하세요.
  mqtt_port:
    name: MQTT 브로커 포트
    description: >-
      Mosquitto 애드온에서 자동 감지됩니다. 외부 브로커에만 설정하세요.
      기본값: 1883.
  mqtt_username:
    name: MQTT 사용자 이름
    description: >-
      Mosquitto 애드온에서 자동 감지됩니다. 외부 브로커 또는 자격 증명
      재정의에만 설정하세요.
  mqtt_password:
    name: MQTT 비밀번호
    description: >-
      Mosquitto 애드온에서 자동 감지됩니다. 외부 브로커 또는 자격 증명
      재정의에만 설정하세요.
  mqtt_use_tls:
    name: MQTT TLS 활성화
    description: >-
      TLS (mqtts://)를 사용하여 MQTT에 연결합니다. 암호화된 연결이
      필요한 브로커에 활성화하세요 (일반적으로 포트 8883). 표준 Mosquitto
      애드온에는 필요하지 않습니다.
  mqtt_ca_file:
    name: MQTT CA 인증서 파일
    description: >-
      브로커의 TLS 인증서를 검증하기 위한 CA 인증서 경로. 보통 /ssl/에
      저장됩니다 (예: /ssl/ca.crt). 자체 서명 인증서에만 필요합니다.
  mqtt_reject_unauthorized:
    name: MQTT TLS 인증서 검증
    description: >-
      브로커의 TLS 인증서를 검증할 수 없는 경우 연결을 거부합니다.
      보안을 위해 활성화 상태를 유지하세요. CA 파일이 없는 자체 서명
      인증서에만 비활성화하세요.

  # ── C-Bus 모니터링 ──
  auto_discover_networks:
    name: C-Bus 네트워크 자동 검색
    description: >-
      연결 시 C-Gate에서 네트워크 ID를 자동으로 검색합니다. 검색된
      네트워크는 폴링 및 HA Discovery에 사용됩니다. 자동 검색이 문제를
      일으키는 경우에만 비활성화하세요. 기본값: 활성화.
  getall_networks:
    name: 모니터링할 C-Bus 네트워크
    description: >-
      장치 상태를 폴링할 C-Bus 네트워크 ID. 기본값: 254 (대부분의
      설치에서 표준 C-Bus 네트워크). C-Gate Toolkit의 프로젝트 트리에서
      네트워크 ID를 찾으세요.
  getall_on_start:
    name: 시작 시 모든 장치 폴링
    description: >-
      애드온 시작 시 모든 장치 상태를 요청하여 Home Assistant를 현재
      C-Bus 상태와 동기화합니다. 기본값: 활성화.
  getall_period:
    name: 폴링 간격 (초)
    description: >-
      모든 장치 상태를 다시 폴링하는 빈도. 낮은 값 = 더 최신 상태이지만
      C-Gate 트래픽이 증가합니다. 기본값: 3600 (1시간).
  getall_app_periods:
    name: 앱별 폴링 간격
    description: >-
      특정 C-Bus 애플리케이션의 폴링 간격을 재정의합니다. 각 항목에는
      app_id (예: HVAC의 경우 "201")와 period_sec (비활성화의 경우 0)이
      있습니다.

  # ── MQTT 게시 ──
  retain_reads:
    name: MQTT 상태 메시지 보존
    description: >-
      상태 메시지에 MQTT 보존 플래그를 설정하여 새 구독자가 즉시 마지막으로
      알려진 장치 상태를 수신하도록 합니다. 기본값: 비활성화.
  message_interval:
    name: 명령 간격 (밀리초)
    description: >-
      C-Gate로 전송되는 명령 간의 최소 지연. 빠른 명령으로 C-Gate가
      과부하되는 것을 방지합니다. 기본값: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Discovery 토픽 접두사
    description: >-
      HA Discovery 메시지의 MQTT 토픽 접두사. Home Assistant의 MQTT
      Discovery 접두사와 일치해야 합니다. 기본값: homeassistant.
  ha_discovery_networks:
    name: Discovery 네트워크
    description: >-
      장치 검색을 위해 스캔할 C-Bus 네트워크 ID. 비어 있으면
      "모니터링할 C-Bus 네트워크"의 네트워크를 사용합니다. 기본값: 254.
  ha_discovery_cover_app_id:
    name: 커버 애플리케이션 ID
    description: >-
      커버 (블라인드, 셔터, 차고문)용 C-Bus 앱 ID. 일반적인 값: 203
      (Enable Control). 커버 검색을 건너뛰려면 비워 두세요.
  ha_discovery_cover_tilt_app_id:
    name: 커버 틸트 애플리케이션 ID
    description: >-
      베네치안 블라인드 틸트 제어용 C-Bus 앱 ID. 그룹 번호로 커버와
      페어링됩니다. 틸트를 건너뛰려면 비워 두세요.
  ha_discovery_switch_app_id:
    name: 스위치 애플리케이션 ID
    description: >-
      스위치 그룹용 C-Bus 앱 ID. 스위치 검색을 건너뛰려면 비워 두세요.
  ha_discovery_trigger_app_id:
    name: 트리거 애플리케이션 ID
    description: >-
      트리거 그룹 (키패드, 장면)용 C-Bus 앱 ID. 일반적인 값: 202.
      트리거 검색을 건너뛰려면 비워 두세요.
  ha_discovery_scene_enabled:
    name: 장면 엔티티 활성화
    description: >-
      각 트리거 그룹에 대해 이벤트 및 버튼 엔티티 외에 Home Assistant
      장면 엔티티를 생성합니다. 기본값: 활성화.
  ha_discovery_hvac_app_id:
    name: HVAC 애플리케이션 ID
    description: >-
      HVAC/기후 영역용 C-Bus 앱 ID. 표준 C-Bus HVAC 앱: 201.
      HVAC 검색을 건너뛰려면 비워 두세요.
  ha_hvac_temperature_unit:
    name: HVAC 온도 단위
    description: >-
      HVAC 기후 엔티티의 온도 단위. C는 섭씨, F는 화씨. 기본값: C.

  # ── Bridge 진단 ──
  ha_bridge_diagnostics_enabled:
    name: Bridge 진단 활성화
    description: >-
      Bridge 상태 엔티티 (준비 상태, 연결, 큐 깊이)를 Home Assistant에
      게시합니다. 기본값: 활성화.
  ha_bridge_diagnostics_interval_sec:
    name: 진단 간격 (초)
    description: >-
      Bridge 진단 상태가 새로 고침되는 빈도. 기본값: 60.

  # ── 오래된 장치 감지 ──
  stale_device_detection_enabled:
    name: 오래된 장치 감지 활성화
    description: >-
      보고를 중단한 C-Bus 장치를 감지하고 경고 센서를 게시합니다.
      기본값: 활성화.
  stale_device_threshold_hours:
    name: 오래된 장치 임계값 (시간)
    description: >-
      장치가 오래된 것으로 간주되기 전 상태 업데이트 없는 시간.
      기본값: 24.
  stale_device_check_interval_sec:
    name: 오래된 장치 확인 간격 (초)
    description: >-
      오래된 장치를 스캔하는 빈도. 기본값: 3600 (1시간).

  # ── 고급: 연결 풀 ──
  connection_pool_size:
    name: 연결 풀 크기
    description: >-
      C-Gate에 대한 병렬 TCP 연결 수. 높은 처리량 설치의 경우 증가하고,
      이전 C-Gate의 경우 1로 줄이세요. 기본값: 3.
  connection_health_check_interval_sec:
    name: 상태 확인 간격 (초)
    description: >-
      C-Gate 연결이 정상인지 확인하는 빈도. 기본값: 30.
  connection_keep_alive_interval_sec:
    name: Keep-Alive 간격 (초)
    description: >-
      C-Gate 연결에 ping하는 빈도. 무음 TCP 끊김을 방지합니다.
      기본값: 60.
  cover_ramp_duration_sec:
    name: 커버 램프 시간 (초)
    description: >-
      커버가 완전히 열리거나 닫히는 데 걸리는 예상 시간. Bridge는 이
      기간 동안 추정 위치를 게시합니다. 기본값: 5.

  # ── 고급: 라벨 파일 및 Web API ──
  cbus_label_file:
    name: 사용자 지정 라벨 파일
    description: >-
      사용자 지정 장치 이름이 포함된 JSON 파일 경로. 설정되지 않은 경우
      일반적인 경로에서 자동 감지됩니다. 파일 변경이 모니터링됩니다.
  web_api_key:
    name: Web API 키
    description: >-
      라벨 편집기의 쓰기 작업을 위한 API 키. 포트 8080을 HA ingress
      외부에 노출할 때 설정하세요.
  web_allow_unauthenticated_mutations:
    name: 인증되지 않은 Web 쓰기 허용 (안전하지 않음)
    description: >-
      API 키 없이 쓰기 엔드포인트를 허용합니다. 이 애드온에 대한 네트워크
      액세스를 완전히 신뢰하지 않는 한 비활성화 상태를 유지하세요.
  web_allowed_origins:
    name: 허용된 Web 오리진 (CORS)
    description: >-
      브라우저 액세스를 위한 CORS 허용 목록. https://ha.example.com과 같은
      전체 오리진을 입력하세요. 교차 출처 액세스를 비활성화하려면 비워
      두세요.
  web_mutation_rate_limit_per_minute:
    name: Web 쓰기 속도 제한
    description: >-
      클라이언트당 분당 최대 변경 API 요청 수. 기본값: 120.
