configuration:
  # ── Pola wymagane (zawsze widoczne) ──
  cgate_mode:
    name: Tryb C-Gate
    description: >-
      Sposób udostępniania C-Gate. "remote" łączy się z serwerem C-Gate
      działającym w innym miejscu sieci (najczęstsze). "managed" pobiera
      i uruchamia C-Gate lokalnie w tym dodatku.
  cgate_host:
    name: Host C-Gate (wymagane)
    description: >-
      Adres IP lub nazwa hosta serwera C-Gate. W trybie zdalnym podaj
      adres maszyny z C-Gate. W trybie zarządzanym użyj 127.0.0.1.
  cgate_project:
    name: Nazwa projektu C-Gate (wymagane)
    description: >-
      Nazwa projektu C-Bus skonfigurowana w C-Gate (np. HOME, MYHOUSE).
      Znajdziesz ją w C-Gate Toolkit w drzewie projektu.
  ha_discovery_enabled:
    name: Włącz Home Assistant Discovery
    description: >-
      Automatycznie rejestruj urządzenia C-Bus w Home Assistant za pomocą
      MQTT Discovery. Większość użytkowników powinna zostawić to włączone.
      Urządzenia pojawiają się jako encje bez ręcznej konfiguracji YAML.
  log_level:
    name: Poziom logowania
    description: >-
      Szczegółowość logowania. Użyj "info" do normalnej pracy, "debug" do
      rozwiązywania problemów z połączeniem lub odkrywaniem.

  # ── Połączenie C-Gate (opcjonalne, rozsądne wartości domyślne) ──
  cgate_port:
    name: Port poleceń C-Gate
    description: >-
      Port TCP dla połączeń poleceń C-Gate. Zmień tylko jeśli Twój C-Gate
      używa niestandardowego portu. Domyślnie: 20023.
  cgate_event_port:
    name: Port zdarzeń C-Gate
    description: >-
      Port TCP dla połączeń zdarzeń C-Gate. Zmień tylko jeśli Twój C-Gate
      używa niestandardowego portu. Domyślnie: 20025.

  # ── Tryb zarządzany C-Gate ──
  cgate_install_source:
    name: Źródło instalacji C-Gate
    description: >-
      Używane tylko w trybie zarządzanym. "download" pobiera C-Gate
      automatycznie. "upload" szuka pliku zip umieszczonego w /share/cgate/.
  cgate_download_url:
    name: URL pobierania C-Gate
    description: >-
      Używane tylko w trybie zarządzanym ze źródłem pobierania. Nadpisz
      jeśli oficjalny URL pobierania Clipsal się zmieni. Pozostaw puste
      dla domyślnego URL.
  cgate_download_sha256:
    name: SHA256 pobierania C-Gate
    description: >-
      Opcjonalna suma kontrolna SHA256 do weryfikacji pobrania C-Gate.
      Zalecana przy użyciu niestandardowego URL pobierania.

  # ── MQTT (zazwyczaj wykrywany automatycznie) ──
  mqtt_host:
    name: Host brokera MQTT
    description: >-
      Wykrywany automatycznie z dodatku Mosquitto — większość użytkowników
      powinna zostawić puste. Ustaw tylko przy użyciu zewnętrznego brokera
      MQTT.
  mqtt_port:
    name: Port brokera MQTT
    description: >-
      Wykrywany automatycznie z dodatku Mosquitto. Ustaw tylko dla
      zewnętrznych brokerów. Domyślnie: 1883.
  mqtt_username:
    name: Nazwa użytkownika MQTT
    description: >-
      Wykrywana automatycznie z dodatku Mosquitto. Ustaw tylko dla
      zewnętrznych brokerów lub aby nadpisać dane logowania.
  mqtt_password:
    name: Hasło MQTT
    description: >-
      Wykrywane automatycznie z dodatku Mosquitto. Ustaw tylko dla
      zewnętrznych brokerów lub aby nadpisać dane logowania.
  mqtt_use_tls:
    name: Włącz MQTT TLS
    description: >-
      Połącz z MQTT przez TLS (mqtts://). Włącz dla brokerów wymagających
      szyfrowanych połączeń (typowo port 8883). Nie wymagane dla
      standardowego dodatku Mosquitto.
  mqtt_ca_file:
    name: Plik certyfikatu CA MQTT
    description: >-
      Ścieżka do certyfikatu CA do weryfikacji certyfikatu TLS brokera.
      Zazwyczaj przechowywany w /ssl/ (np. /ssl/ca.crt). Wymagany tylko
      dla certyfikatów samopodpisanych.
  mqtt_reject_unauthorized:
    name: Weryfikuj certyfikat TLS MQTT
    description: >-
      Odrzucaj połączenia jeśli certyfikat TLS brokera nie może być
      zweryfikowany. Pozostaw włączone dla bezpieczeństwa. Wyłącz tylko
      dla certyfikatów samopodpisanych bez pliku CA.

  # ── Monitorowanie C-Bus ──
  auto_discover_networks:
    name: Automatyczne odkrywanie sieci C-Bus
    description: >-
      Automatycznie odkrywaj identyfikatory sieci z C-Gate przy połączeniu.
      Odkryte sieci są używane do odpytywania i HA Discovery. Wyłącz tylko
      jeśli auto-odkrywanie powoduje problemy. Domyślnie: włączone.
  getall_networks:
    name: Sieci C-Bus do monitorowania
    description: >-
      Identyfikatory sieci C-Bus do odpytywania stanów urządzeń.
      Domyślnie: 254 (standardowa sieć C-Bus dla większości instalacji).
      Znajdź identyfikatory sieci w C-Gate Toolkit w drzewie projektu.
  getall_on_start:
    name: Odpytuj wszystkie urządzenia przy starcie
    description: >-
      Pobierz stany wszystkich urządzeń przy uruchomieniu dodatku,
      synchronizując Home Assistant z aktualnym stanem C-Bus. Domyślnie:
      włączone.
  getall_period:
    name: Interwał odpytywania (sekundy)
    description: >-
      Jak często ponownie odpytywać stany wszystkich urządzeń. Niższe
      wartości = świeższy stan ale więcej ruchu C-Gate. Domyślnie: 3600
      (1 godzina).
  getall_app_periods:
    name: Interwały odpytywania per aplikacja
    description: >-
      Nadpisz interwał odpytywania dla konkretnych aplikacji C-Bus. Każdy
      wpis ma app_id (np. "201" dla HVAC) i period_sec (0 aby wyłączyć).

  # ── Publikowanie MQTT ──
  retain_reads:
    name: Zachowuj wiadomości stanu MQTT
    description: >-
      Ustaw flagę MQTT retain na wiadomościach stanu, aby nowi subskrybenci
      natychmiast otrzymywali ostatni znany stan urządzeń. Domyślnie:
      wyłączone.
  message_interval:
    name: Interwał poleceń (ms)
    description: >-
      Minimalne opóźnienie między poleceniami wysyłanymi do C-Gate.
      Zapobiega przeciążeniu C-Gate szybkimi poleceniami. Domyślnie: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Prefiks tematu Discovery
    description: >-
      Prefiks tematu MQTT dla wiadomości HA Discovery. Musi być zgodny z
      prefiksem MQTT Discovery w Home Assistant. Domyślnie: homeassistant.
  ha_discovery_networks:
    name: Sieci Discovery
    description: >-
      Identyfikatory sieci C-Bus do skanowania w celu wykrywania urządzeń.
      Jeśli puste, używane są sieci z "Sieci C-Bus do monitorowania".
      Domyślnie: 254.
  ha_discovery_cover_app_id:
    name: ID aplikacji osłon
    description: >-
      ID aplikacji C-Bus dla osłon (żaluzje, rolety, bramy garażowe).
      Typowa wartość: 203 (Enable Control). Pozostaw puste aby pominąć
      wykrywanie osłon.
  ha_discovery_cover_tilt_app_id:
    name: ID aplikacji pochylenia osłon
    description: >-
      ID aplikacji C-Bus dla sterowania pochyleniem żaluzji weneckich.
      Powiązane z osłonami po numerze grupy. Pozostaw puste aby pominąć
      pochylenie.
  ha_discovery_switch_app_id:
    name: ID aplikacji przełączników
    description: >-
      ID aplikacji C-Bus dla grup przełączników. Pozostaw puste aby
      pominąć wykrywanie przełączników.
  ha_discovery_trigger_app_id:
    name: ID aplikacji wyzwalaczy
    description: >-
      ID aplikacji C-Bus dla grup wyzwalaczy (klawiatury, sceny). Typowa
      wartość: 202. Pozostaw puste aby pominąć wykrywanie wyzwalaczy.
  ha_discovery_scene_enabled:
    name: Włącz encje scen
    description: >-
      Utwórz encję sceny Home Assistant dla każdej grupy wyzwalaczy,
      oprócz encji zdarzeń i przycisków. Domyślnie: włączone.
  ha_discovery_hvac_app_id:
    name: ID aplikacji HVAC
    description: >-
      ID aplikacji C-Bus dla stref HVAC/klimatu. Standardowa aplikacja
      HVAC C-Bus: 201. Pozostaw puste aby pominąć wykrywanie HVAC.
  ha_hvac_temperature_unit:
    name: Jednostka temperatury HVAC
    description: >-
      Jednostka temperatury dla encji klimatu HVAC. C dla Celsjusza, F
      dla Fahrenheita. Domyślnie: C.

  # ── Diagnostyka bridge ──
  ha_bridge_diagnostics_enabled:
    name: Włącz diagnostykę bridge
    description: >-
      Publikuj encje zdrowia bridge (stan gotowości, połączenia, głębokość
      kolejki) do Home Assistant. Domyślnie: włączone.
  ha_bridge_diagnostics_interval_sec:
    name: Interwał diagnostyki (sekundy)
    description: >-
      Jak często odświeżane są stany diagnostyczne bridge. Domyślnie: 60.

  # ── Wykrywanie nieaktywnych urządzeń ──
  stale_device_detection_enabled:
    name: Włącz wykrywanie nieaktywnych urządzeń
    description: >-
      Wykrywaj urządzenia C-Bus które przestają raportować i publikuj
      czujnik ostrzeżenia. Domyślnie: włączone.
  stale_device_threshold_hours:
    name: Próg nieaktywności urządzenia (godziny)
    description: >-
      Godziny bez aktualizacji stanu zanim urządzenie zostanie uznane za
      nieaktywne. Domyślnie: 24.
  stale_device_check_interval_sec:
    name: Interwał sprawdzania nieaktywności (sekundy)
    description: >-
      Jak często skanować w poszukiwaniu nieaktywnych urządzeń. Domyślnie:
      3600 (1 godzina).

  # ── Zaawansowane: Pula połączeń ──
  connection_pool_size:
    name: Rozmiar puli połączeń
    description: >-
      Liczba równoległych połączeń TCP do C-Gate. Zwiększ dla instalacji
      o wysokiej przepustowości, zmniejsz do 1 dla starszych C-Gate.
      Domyślnie: 3.
  connection_health_check_interval_sec:
    name: Interwał sprawdzania stanu (sekundy)
    description: >-
      Jak często weryfikować czy połączenia C-Gate są zdrowe. Domyślnie:
      30.
  connection_keep_alive_interval_sec:
    name: Interwał Keep-Alive (sekundy)
    description: >-
      Jak często pingować połączenia C-Gate. Zapobiega cichym zerwaniom
      TCP. Domyślnie: 60.
  cover_ramp_duration_sec:
    name: Czas ruchu osłon (sekundy)
    description: >-
      Oczekiwany czas pełnego otwarcia/zamknięcia osłony. Bridge publikuje
      szacowane pozycje w tym oknie. Domyślnie: 5.

  # ── Zaawansowane: Plik etykiet i Web API ──
  cbus_label_file:
    name: Niestandardowy plik etykiet
    description: >-
      Ścieżka do pliku JSON z niestandardowymi nazwami urządzeń.
      Automatycznie wykrywany z typowych ścieżek jeśli nie ustawiony.
      Plik jest monitorowany pod kątem zmian.
  web_api_key:
    name: Klucz Web API
    description: >-
      Klucz API dla operacji zapisu w edytorze etykiet. Ustaw gdy port
      8080 jest eksponowany poza HA ingress.
  web_allow_unauthenticated_mutations:
    name: Zezwól na nieuwierzytelnione zapisy web (niebezpieczne)
    description: >-
      Zezwól na endpointy zapisu bez klucza API. Pozostaw wyłączone chyba
      że w pełni ufasz dostępowi sieciowemu do tego dodatku.
  web_allowed_origins:
    name: Dozwolone źródła web (CORS)
    description: >-
      Lista dozwolonych CORS dla dostępu z przeglądarki. Wpisz pełne
      źródła jak https://ha.example.com. Pozostaw puste aby wyłączyć
      dostęp cross-origin.
  web_mutation_rate_limit_per_minute:
    name: Limit zapisów web
    description: >-
      Maksymalna liczba modyfikujących żądań API na minutę na klienta.
      Domyślnie: 120.
