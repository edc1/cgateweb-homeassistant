configuration:
  # ── Required fields (always visible) ──
  cgate_mode:
    name: C-Gate Mode
    description: >-
      How C-Gate is provided. "remote" connects to a C-Gate server running
      elsewhere on your network (most common). "managed" downloads and runs
      C-Gate locally inside this add-on.
  cgate_host:
    name: C-Gate Host (required)
    description: >-
      IP address or hostname of your C-Gate server. For remote mode, enter the
      address of the machine running C-Gate. For managed mode, use 127.0.0.1.
  cgate_project:
    name: C-Gate Project Name (required)
    description: >-
      The name of your C-Bus project as configured in C-Gate (e.g., HOME, MYHOUSE).
      Find this in C-Gate Toolkit under your project tree.
  ha_discovery_enabled:
    name: Enable Home Assistant Discovery
    description: >-
      Automatically register C-Bus devices with Home Assistant using MQTT
      Discovery. Most users should leave this enabled. Devices appear as
      entities without manual YAML configuration.
  log_level:
    name: Log Level
    description: >-
      Logging verbosity. Use "info" for normal operation, "debug" for
      troubleshooting connection or discovery issues.

  # ── C-Gate Connection (optional, has sensible defaults) ──
  cgate_port:
    name: C-Gate Command Port
    description: >-
      TCP port for C-Gate command connections. Only change this if your C-Gate
      uses a non-standard port. Default: 20023.
  cgate_event_port:
    name: C-Gate Event Port
    description: >-
      TCP port for C-Gate event connections. Only change this if your C-Gate
      uses a non-standard port. Default: 20025.

  # ── C-Gate Managed Mode ──
  cgate_install_source:
    name: C-Gate Install Source
    description: >-
      Only used in managed mode. "download" fetches C-Gate automatically.
      "upload" looks for a zip file you place in /share/cgate/.
  cgate_download_url:
    name: C-Gate Download URL
    description: >-
      Only used in managed mode with download source. Override if the official
      Clipsal download URL changes. Leave empty for the default URL.
  cgate_download_sha256:
    name: C-Gate Download SHA256
    description: >-
      Optional SHA256 checksum to verify the C-Gate download. Recommended when
      using a custom download URL.

  # ── MQTT (usually auto-detected) ──
  mqtt_host:
    name: MQTT Broker Host
    description: >-
      Auto-detected from the Mosquitto add-on — most users should leave this
      empty. Only set this if using an external MQTT broker.
  mqtt_port:
    name: MQTT Broker Port
    description: >-
      Auto-detected from the Mosquitto add-on. Only set for external brokers.
      Default: 1883.
  mqtt_username:
    name: MQTT Username
    description: >-
      Auto-detected from the Mosquitto add-on. Only set for external brokers
      or to override credentials.
  mqtt_password:
    name: MQTT Password
    description: >-
      Auto-detected from the Mosquitto add-on. Only set for external brokers
      or to override credentials.
  mqtt_use_tls:
    name: Enable MQTT TLS
    description: >-
      Connect to MQTT using TLS (mqtts://). Enable for brokers requiring
      encrypted connections (typically port 8883). Not needed for the standard
      Mosquitto add-on.
  mqtt_ca_file:
    name: MQTT CA Certificate File
    description: >-
      Path to CA certificate for verifying the broker's TLS certificate.
      Usually stored in /ssl/ (e.g., /ssl/ca.crt). Only needed for
      self-signed certificates.
  mqtt_reject_unauthorized:
    name: Verify MQTT TLS Certificate
    description: >-
      Reject connections if the broker's TLS certificate cannot be verified.
      Keep enabled for security. Only disable for self-signed certificates
      without a CA file.

  # ── C-Bus Monitoring ──
  auto_discover_networks:
    name: Auto-Discover C-Bus Networks
    description: >-
      Automatically discover network IDs from C-Gate on connect. Discovered
      networks are used for polling and HA Discovery. Disable only if
      auto-discovery causes issues. Default: enabled.
  getall_networks:
    name: C-Bus Networks to Monitor
    description: >-
      C-Bus network IDs to poll for device states. Default: 254 (standard
      C-Bus network for most installations). Find your network IDs in C-Gate
      Toolkit under your project tree.
  getall_on_start:
    name: Poll All Devices on Startup
    description: >-
      Request all device states when the add-on starts, synchronizing Home
      Assistant with current C-Bus state. Default: enabled.
  getall_period:
    name: Poll Interval (seconds)
    description: >-
      How often to re-poll all device states. Lower values = fresher state
      but more C-Gate traffic. Default: 3600 (1 hour).
  getall_app_periods:
    name: Per-App Poll Intervals
    description: >-
      Override the poll interval for specific C-Bus applications. Each entry
      has an app_id (e.g., "201" for HVAC) and period_sec (0 to disable).

  # ── MQTT Publishing ──
  retain_reads:
    name: Retain MQTT State Messages
    description: >-
      Set the MQTT retain flag on state messages so new subscribers
      immediately receive last known device states. Default: disabled.
  message_interval:
    name: Command Interval (ms)
    description: >-
      Minimum delay between commands sent to C-Gate. Prevents overwhelming
      C-Gate with rapid commands. Default: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Discovery Topic Prefix
    description: >-
      MQTT topic prefix for HA Discovery messages. Must match your Home
      Assistant MQTT discovery prefix. Default: homeassistant.
  ha_discovery_networks:
    name: Discovery Networks
    description: >-
      C-Bus network IDs to scan for device discovery. If empty, uses the
      networks from "C-Bus Networks to Monitor". Default: 254.
  ha_discovery_cover_app_id:
    name: Cover Application ID
    description: >-
      C-Bus app ID for covers (blinds, shutters, garage doors). Common
      value: 203 (Enable Control). Leave empty to skip cover discovery.
  ha_discovery_cover_tilt_app_id:
    name: Cover Tilt Application ID
    description: >-
      C-Bus app ID for venetian blind tilt control. Paired by group number
      with covers. Leave empty to skip tilt.
  ha_discovery_switch_app_id:
    name: Switch Application ID
    description: >-
      C-Bus app ID for switch groups. Leave empty to skip switch discovery.
  ha_discovery_trigger_app_id:
    name: Trigger Application ID
    description: >-
      C-Bus app ID for trigger groups (keypads, scenes). Common value: 202.
      Leave empty to skip trigger discovery.
  ha_discovery_scene_enabled:
    name: Enable Scene Entities
    description: >-
      Create a Home Assistant scene entity for each trigger group, in addition
      to event and button entities. Default: enabled.
  ha_discovery_hvac_app_id:
    name: HVAC Application ID
    description: >-
      C-Bus app ID for HVAC/climate zones. Standard C-Bus HVAC app: 201.
      Leave empty to skip HVAC discovery.
  ha_hvac_temperature_unit:
    name: HVAC Temperature Unit
    description: >-
      Temperature unit for HVAC climate entities. C for Celsius, F for
      Fahrenheit. Default: C.

  # ── Bridge Diagnostics ──
  ha_bridge_diagnostics_enabled:
    name: Enable Bridge Diagnostics
    description: >-
      Publish bridge health entities (ready state, connections, queue depth)
      to Home Assistant. Default: enabled.
  ha_bridge_diagnostics_interval_sec:
    name: Diagnostics Interval (seconds)
    description: >-
      How often bridge diagnostic states are refreshed. Default: 60.

  # ── Stale Device Detection ──
  stale_device_detection_enabled:
    name: Enable Stale Device Detection
    description: >-
      Detect C-Bus devices that stop reporting and publish a warning sensor.
      Default: enabled.
  stale_device_threshold_hours:
    name: Stale Device Threshold (hours)
    description: >-
      Hours without a state update before a device is considered stale.
      Default: 24.
  stale_device_check_interval_sec:
    name: Stale Check Interval (seconds)
    description: >-
      How often to scan for stale devices. Default: 3600 (1 hour).

  # ── Advanced: Connection Pool ──
  connection_pool_size:
    name: Connection Pool Size
    description: >-
      Number of parallel TCP connections to C-Gate. Increase for
      high-throughput installations, reduce to 1 for older C-Gate. Default: 3.
  connection_health_check_interval_sec:
    name: Health Check Interval (seconds)
    description: >-
      How often to verify C-Gate connections are healthy. Default: 30.
  connection_keep_alive_interval_sec:
    name: Keep-Alive Interval (seconds)
    description: >-
      How often to ping C-Gate connections. Prevents silent TCP drops.
      Default: 60.
  cover_ramp_duration_sec:
    name: Cover Ramp Duration (seconds)
    description: >-
      Expected time for a cover to fully open/close. The bridge publishes
      estimated positions during this window. Default: 5.

  # ── Advanced: Label File & Web API ──
  cbus_label_file:
    name: Custom Label File
    description: >-
      Path to a JSON file with custom device names. Auto-detected from common
      paths if not set. The file is watched for changes.
  web_api_key:
    name: Web API Key
    description: >-
      API key for write operations in the label editor. Set this when exposing
      port 8080 beyond HA ingress.
  web_allow_unauthenticated_mutations:
    name: Allow Unauthenticated Web Writes (Unsafe)
    description: >-
      Allow write endpoints without an API key. Keep disabled unless you
      fully trust network access to this add-on.
  web_allowed_origins:
    name: Allowed Web Origins (CORS)
    description: >-
      CORS allowlist for browser access. Enter full origins like
      https://ha.example.com. Leave empty to disable cross-origin access.
  web_mutation_rate_limit_per_minute:
    name: Web Write Rate Limit
    description: >-
      Maximum mutating API requests per minute per client. Default: 120.
