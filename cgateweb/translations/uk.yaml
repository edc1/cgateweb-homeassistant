configuration:
  # ── Обов'язкові поля (завжди видимі) ──
  cgate_mode:
    name: Режим C-Gate
    description: >-
      Спосіб надання C-Gate. "remote" підключається до сервера C-Gate, що
      працює в іншому місці вашої мережі (найпоширеніший). "managed"
      завантажує та запускає C-Gate локально всередині цього додатка.
  cgate_host:
    name: Хост C-Gate (обов'язково)
    description: >-
      IP-адреса або ім'я хоста вашого сервера C-Gate. У віддаленому режимі
      введіть адресу машини з C-Gate. У керованому режимі використовуйте
      127.0.0.1.
  cgate_project:
    name: Назва проєкту C-Gate (обов'язково)
    description: >-
      Назва вашого проєкту C-Bus, налаштованого в C-Gate (наприклад, HOME,
      MYHOUSE). Знайдіть її в C-Gate Toolkit у дереві проєкту.
  ha_discovery_enabled:
    name: Увімкнути Home Assistant Discovery
    description: >-
      Автоматично реєструвати пристрої C-Bus у Home Assistant за допомогою
      MQTT Discovery. Більшість користувачів повинні залишити це увімкненим.
      Пристрої з'являються як об'єкти без ручного налаштування YAML.
  log_level:
    name: Рівень журналювання
    description: >-
      Детальність журналювання. Використовуйте "info" для звичайної роботи,
      "debug" для усунення проблем з підключенням або виявленням.

  # ── Підключення C-Gate (необов'язково, розумні значення за замовчуванням) ──
  cgate_port:
    name: Командний порт C-Gate
    description: >-
      TCP-порт для командних з'єднань C-Gate. Змінюйте лише якщо ваш
      C-Gate використовує нестандартний порт. За замовчуванням: 20023.
  cgate_event_port:
    name: Порт подій C-Gate
    description: >-
      TCP-порт для з'єднань подій C-Gate. Змінюйте лише якщо ваш C-Gate
      використовує нестандартний порт. За замовчуванням: 20025.

  # ── Керований режим C-Gate ──
  cgate_install_source:
    name: Джерело встановлення C-Gate
    description: >-
      Використовується лише в керованому режимі. "download" завантажує
      C-Gate автоматично. "upload" шукає zip-файл, який ви розмістили в
      /share/cgate/.
  cgate_download_url:
    name: URL завантаження C-Gate
    description: >-
      Використовується лише в керованому режимі з джерелом завантаження.
      Перевизначте, якщо офіційний URL завантаження Clipsal зміниться.
      Залиште порожнім для URL за замовчуванням.
  cgate_download_sha256:
    name: SHA256 завантаження C-Gate
    description: >-
      Необов'язкова контрольна сума SHA256 для перевірки завантаження
      C-Gate. Рекомендується при використанні власного URL завантаження.

  # ── MQTT (зазвичай визначається автоматично) ──
  mqtt_host:
    name: Хост брокера MQTT
    description: >-
      Визначається автоматично з додатка Mosquitto — більшість користувачів
      повинні залишити порожнім. Встановлюйте лише при використанні
      зовнішнього брокера MQTT.
  mqtt_port:
    name: Порт брокера MQTT
    description: >-
      Визначається автоматично з додатка Mosquitto. Встановлюйте лише для
      зовнішніх брокерів. За замовчуванням: 1883.
  mqtt_username:
    name: Ім'я користувача MQTT
    description: >-
      Визначається автоматично з додатка Mosquitto. Встановлюйте лише для
      зовнішніх брокерів або для перевизначення облікових даних.
  mqtt_password:
    name: Пароль MQTT
    description: >-
      Визначається автоматично з додатка Mosquitto. Встановлюйте лише для
      зовнішніх брокерів або для перевизначення облікових даних.
  mqtt_use_tls:
    name: Увімкнути MQTT TLS
    description: >-
      Підключення до MQTT через TLS (mqtts://). Увімкніть для брокерів,
      що вимагають шифрованих з'єднань (зазвичай порт 8883). Не потрібно
      для стандартного додатка Mosquitto.
  mqtt_ca_file:
    name: Файл сертифіката CA MQTT
    description: >-
      Шлях до сертифіката CA для перевірки TLS-сертифіката брокера.
      Зазвичай зберігається в /ssl/ (наприклад, /ssl/ca.crt). Потрібен
      лише для самопідписаних сертифікатів.
  mqtt_reject_unauthorized:
    name: Перевірка TLS-сертифіката MQTT
    description: >-
      Відхиляти підключення, якщо TLS-сертифікат брокера не може бути
      перевірений. Залишити увімкненим для безпеки. Вимикати лише для
      самопідписаних сертифікатів без файлу CA.

  # ── Моніторинг C-Bus ──
  auto_discover_networks:
    name: Автоматичне виявлення мереж C-Bus
    description: >-
      Автоматично виявляти ідентифікатори мереж від C-Gate при підключенні.
      Виявлені мережі використовуються для опитування та HA Discovery.
      Вимикайте лише якщо автовиявлення спричиняє проблеми. За
      замовчуванням: увімкнено.
  getall_networks:
    name: Мережі C-Bus для моніторингу
    description: >-
      Ідентифікатори мереж C-Bus для опитування станів пристроїв. За
      замовчуванням: 254 (стандартна мережа C-Bus для більшості
      інсталяцій). Знайдіть ідентифікатори мереж у C-Gate Toolkit у
      дереві проєкту.
  getall_on_start:
    name: Опитати всі пристрої при запуску
    description: >-
      Запитувати стани всіх пристроїв при запуску додатка, синхронізуючи
      Home Assistant з поточним станом C-Bus. За замовчуванням: увімкнено.
  getall_period:
    name: Інтервал опитування (секунди)
    description: >-
      Як часто повторно опитувати стани всіх пристроїв. Менші значення =
      більш актуальні дані, але більше трафіку C-Gate. За замовчуванням:
      3600 (1 година).
  getall_app_periods:
    name: Інтервали опитування за застосунками
    description: >-
      Перевизначити інтервал опитування для конкретних застосунків C-Bus.
      Кожен запис має app_id (наприклад, "201" для HVAC) та period_sec
      (0 для вимкнення).

  # ── Публікація MQTT ──
  retain_reads:
    name: Зберігати повідомлення про стан MQTT
    description: >-
      Встановлювати прапорець MQTT retain на повідомленнях про стан, щоб
      нові підписники одразу отримували останні відомі стани. За
      замовчуванням: вимкнено.
  message_interval:
    name: Інтервал команд (мс)
    description: >-
      Мінімальна затримка між командами до C-Gate. Запобігає
      перевантаженню C-Gate швидкими командами. За замовчуванням: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Префікс топіка Discovery
    description: >-
      Префікс топіка MQTT для повідомлень HA Discovery. Має збігатися з
      префіксом MQTT Discovery вашого Home Assistant. За замовчуванням:
      homeassistant.
  ha_discovery_networks:
    name: Мережі Discovery
    description: >-
      Ідентифікатори мереж C-Bus для сканування при виявленні пристроїв.
      Якщо порожньо, використовуються мережі з «Мережі C-Bus для
      моніторингу». За замовчуванням: 254.
  ha_discovery_cover_app_id:
    name: ID застосунку для штор
    description: >-
      ID застосунку C-Bus для штор (жалюзі, ролети, гаражні ворота).
      Типове значення: 203 (Enable Control). Залиште порожнім, щоб
      пропустити виявлення штор.
  ha_discovery_cover_tilt_app_id:
    name: ID застосунку для нахилу штор
    description: >-
      ID застосунку C-Bus для керування нахилом жалюзі. Пов'язується за
      номером групи зі шторами. Залиште порожнім, щоб пропустити нахил.
  ha_discovery_switch_app_id:
    name: ID застосунку для вимикачів
    description: >-
      ID застосунку C-Bus для груп вимикачів. Залиште порожнім, щоб
      пропустити виявлення вимикачів.
  ha_discovery_trigger_app_id:
    name: ID застосунку для тригерів
    description: >-
      ID застосунку C-Bus для груп тригерів (клавіатури, сцени). Типове
      значення: 202. Залиште порожнім, щоб пропустити виявлення тригерів.
  ha_discovery_scene_enabled:
    name: Увімкнути об'єкти сцен
    description: >-
      Створювати об'єкт сцени Home Assistant для кожної групи тригерів,
      на додаток до об'єктів подій та кнопок. За замовчуванням: увімкнено.
  ha_discovery_hvac_app_id:
    name: ID застосунку HVAC
    description: >-
      ID застосунку C-Bus для зон HVAC/клімату. Стандартний застосунок
      HVAC C-Bus: 201. Залиште порожнім, щоб пропустити виявлення HVAC.
  ha_hvac_temperature_unit:
    name: Одиниця температури HVAC
    description: >-
      Одиниця температури для кліматичних об'єктів HVAC. C для Цельсія,
      F для Фаренгейта. За замовчуванням: C.

  # ── Діагностика bridge ──
  ha_bridge_diagnostics_enabled:
    name: Увімкнути діагностику bridge
    description: >-
      Публікувати об'єкти стану bridge (готовність, підключення, глибина
      черги) до Home Assistant. За замовчуванням: увімкнено.
  ha_bridge_diagnostics_interval_sec:
    name: Інтервал діагностики (секунди)
    description: >-
      Як часто оновлюються діагностичні стани bridge. За замовчуванням: 60.

  # ── Виявлення застарілих пристроїв ──
  stale_device_detection_enabled:
    name: Увімкнути виявлення застарілих пристроїв
    description: >-
      Виявляти пристрої C-Bus, які перестали відповідати, та публікувати
      датчик попередження. За замовчуванням: увімкнено.
  stale_device_threshold_hours:
    name: Поріг застарілого пристрою (години)
    description: >-
      Годин без оновлення стану, перш ніж пристрій вважається застарілим.
      За замовчуванням: 24.
  stale_device_check_interval_sec:
    name: Інтервал перевірки застарілості (секунди)
    description: >-
      Як часто шукати застарілі пристрої. За замовчуванням: 3600
      (1 година).

  # ── Розширені: Пул підключень ──
  connection_pool_size:
    name: Розмір пулу підключень
    description: >-
      Кількість паралельних TCP-підключень до C-Gate. Збільшіть для
      високонавантажених інсталяцій, зменшіть до 1 для старих C-Gate.
      За замовчуванням: 3.
  connection_health_check_interval_sec:
    name: Інтервал перевірки стану (секунди)
    description: >-
      Як часто перевіряти працездатність підключень C-Gate. За
      замовчуванням: 30.
  connection_keep_alive_interval_sec:
    name: Інтервал Keep-Alive (секунди)
    description: >-
      Як часто пінгувати підключення C-Gate. Запобігає тихим розривам
      TCP. За замовчуванням: 60.
  cover_ramp_duration_sec:
    name: Тривалість руху штор (секунди)
    description: >-
      Очікуваний час повного відкриття/закриття штор. Bridge публікує
      розрахункові позиції протягом цього вікна. За замовчуванням: 5.

  # ── Розширені: Файл міток та Web API ──
  cbus_label_file:
    name: Користувацький файл міток
    description: >-
      Шлях до JSON-файлу з користувацькими іменами пристроїв. Автоматично
      визначається зі стандартних шляхів, якщо не задано. Файл
      відстежується на зміни.
  web_api_key:
    name: Ключ Web API
    description: >-
      Ключ API для операцій запису в редакторі міток. Задайте при
      відкритті порту 8080 за межами HA ingress.
  web_allow_unauthenticated_mutations:
    name: Дозволити неавтентифіковані веб-записи (небезпечно)
    description: >-
      Дозволити кінцеві точки запису без ключа API. Залишити вимкненим,
      якщо ви повністю не довіряєте мережевому доступу до цього додатка.
  web_allowed_origins:
    name: Дозволені веб-джерела (CORS)
    description: >-
      Список дозволених джерел CORS для доступу з браузера. Введіть повні
      джерела, наприклад https://ha.example.com. Залиште порожнім для
      вимкнення крос-доменного доступу.
  web_mutation_rate_limit_per_minute:
    name: Ліміт веб-записів
    description: >-
      Максимум мутуючих API-запитів на хвилину на клієнта. За
      замовчуванням: 120.
