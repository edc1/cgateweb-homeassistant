configuration:
  # ── Obligatoriske felter (altid synlige) ──
  cgate_mode:
    name: C-Gate tilstand
    description: >-
      Hvordan C-Gate leveres. "remote" forbinder til en C-Gate server der
      kører et andet sted på dit netværk (mest almindelig). "managed"
      downloader og kører C-Gate lokalt i denne tilføjelse.
  cgate_host:
    name: C-Gate vært (påkrævet)
    description: >-
      IP-adresse eller værtsnavn for din C-Gate server. I fjerntilstand
      indtastes adressen på maskinen der kører C-Gate. I administreret
      tilstand bruges 127.0.0.1.
  cgate_project:
    name: C-Gate projektnavn (påkrævet)
    description: >-
      Navnet på dit C-Bus projekt som konfigureret i C-Gate (f.eks. HOME,
      MYHOUSE). Find det i C-Gate Toolkit under dit projekttræ.
  ha_discovery_enabled:
    name: Aktivér Home Assistant Discovery
    description: >-
      Registrer automatisk C-Bus enheder i Home Assistant ved hjælp af
      MQTT Discovery. De fleste brugere bør lade dette være aktiveret.
      Enheder vises som entiteter uden manuel YAML-konfiguration.
  log_level:
    name: Logniveau
    description: >-
      Logningsdetalje. Brug "info" til normal drift, "debug" til
      fejlfinding af forbindelses- eller opdagelsesproblemer.

  # ── C-Gate forbindelse (valgfrit, fornuftige standardværdier) ──
  cgate_port:
    name: C-Gate kommandoport
    description: >-
      TCP-port til C-Gate kommandoforbindelser. Ændres kun hvis din
      C-Gate bruger en ikke-standard port. Standard: 20023.
  cgate_event_port:
    name: C-Gate hændelsesport
    description: >-
      TCP-port til C-Gate hændelsesforbindelser. Ændres kun hvis din
      C-Gate bruger en ikke-standard port. Standard: 20025.

  # ── C-Gate administreret tilstand ──
  cgate_install_source:
    name: C-Gate installationskilde
    description: >-
      Bruges kun i administreret tilstand. "download" henter C-Gate
      automatisk. "upload" leder efter en zip-fil du har placeret i
      /share/cgate/.
  cgate_download_url:
    name: C-Gate download URL
    description: >-
      Bruges kun i administreret tilstand med downloadkilde. Tilsidesæt
      hvis den officielle Clipsal download-URL ændres. Lad stå tomt for
      standard-URL'en.
  cgate_download_sha256:
    name: C-Gate download SHA256
    description: >-
      Valgfri SHA256-kontrolsum til at verificere C-Gate downloaden.
      Anbefales ved brug af en brugerdefineret download-URL.

  # ── MQTT (registreres normalt automatisk) ──
  mqtt_host:
    name: MQTT Broker vært
    description: >-
      Registreres automatisk fra Mosquitto tilføjelsen — de fleste
      brugere bør lade dette stå tomt. Indstilles kun hvis du bruger en
      ekstern MQTT broker.
  mqtt_port:
    name: MQTT Broker port
    description: >-
      Registreres automatisk fra Mosquitto tilføjelsen. Indstilles kun
      for eksterne brokere. Standard: 1883.
  mqtt_username:
    name: MQTT brugernavn
    description: >-
      Registreres automatisk fra Mosquitto tilføjelsen. Indstilles kun
      for eksterne brokere eller for at tilsidesætte loginoplysninger.
  mqtt_password:
    name: MQTT adgangskode
    description: >-
      Registreres automatisk fra Mosquitto tilføjelsen. Indstilles kun
      for eksterne brokere eller for at tilsidesætte loginoplysninger.
  mqtt_use_tls:
    name: Aktivér MQTT TLS
    description: >-
      Forbind til MQTT med TLS (mqtts://). Aktivér for brokere der
      kræver krypterede forbindelser (typisk port 8883). Ikke nødvendig
      for standard Mosquitto tilføjelsen.
  mqtt_ca_file:
    name: MQTT CA-certifikatfil
    description: >-
      Sti til CA-certifikat til at verificere brokerens TLS-certifikat.
      Normalt gemt i /ssl/ (f.eks. /ssl/ca.crt). Kun nødvendig for
      selvunderskrevne certifikater.
  mqtt_reject_unauthorized:
    name: Verificér MQTT TLS-certifikat
    description: >-
      Afvis forbindelser hvis brokerens TLS-certifikat ikke kan
      verificeres. Behold aktiveret for sikkerhed. Deaktivér kun for
      selvunderskrevne certifikater uden CA-fil.

  # ── C-Bus overvågning ──
  auto_discover_networks:
    name: Auto-opdagelse af C-Bus netværk
    description: >-
      Opdag automatisk netværks-ID'er fra C-Gate ved forbindelse.
      Opdagede netværk bruges til forespørgsel og HA Discovery.
      Deaktivér kun hvis auto-opdagelse forårsager problemer. Standard:
      aktiveret.
  getall_networks:
    name: C-Bus netværk at overvåge
    description: >-
      C-Bus netværks-ID'er til at forespørge enhedstilstande. Standard:
      254 (standard C-Bus netværk for de fleste installationer). Find
      dine netværks-ID'er i C-Gate Toolkit under dit projekttræ.
  getall_on_start:
    name: Forespørg alle enheder ved opstart
    description: >-
      Hent alle enhedstilstande når tilføjelsen starter, for at
      synkronisere Home Assistant med aktuel C-Bus tilstand. Standard:
      aktiveret.
  getall_period:
    name: Forespørgselsinterval (sekunder)
    description: >-
      Hvor ofte alle enhedstilstande hentes igen. Lavere værdier =
      mere opdaterede tilstande men mere C-Gate trafik. Standard: 3600
      (1 time).
  getall_app_periods:
    name: Forespørgselsintervaller per applikation
    description: >-
      Tilsidesæt forespørgselsintervallet for specifikke C-Bus
      applikationer. Hver post har en app_id (f.eks. "201" for HVAC) og
      period_sec (0 for at deaktivere).

  # ── MQTT publicering ──
  retain_reads:
    name: Bevar MQTT statusbeskeder
    description: >-
      Sæt MQTT retain-flaget på statusbeskeder så nye abonnenter straks
      modtager sidst kendte enhedstilstande. Standard: deaktiveret.
  message_interval:
    name: Kommandointerval (ms)
    description: >-
      Minimumsforsinkelse mellem kommandoer til C-Gate. Forhindrer
      overbelastning af C-Gate med hurtige kommandoer. Standard: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Discovery emnepræfiks
    description: >-
      MQTT emnepræfiks for HA Discovery beskeder. Skal matche dit Home
      Assistant MQTT Discovery præfiks. Standard: homeassistant.
  ha_discovery_networks:
    name: Discovery netværk
    description: >-
      C-Bus netværks-ID'er der skal scannes for enhedsopdagelse. Hvis
      tomt, bruges netværkene fra "C-Bus netværk at overvåge". Standard:
      254.
  ha_discovery_cover_app_id:
    name: Applikations-ID for afdækninger
    description: >-
      C-Bus app-ID for afdækninger (persienner, rullegardiner,
      garageporte). Almindelig værdi: 203 (Enable Control). Lad stå tomt
      for at springe afdækningsopdagelse over.
  ha_discovery_cover_tilt_app_id:
    name: Applikations-ID for afdækningstilt
    description: >-
      C-Bus app-ID for tiltstyring af persienner. Kobles via
      gruppenummer med afdækninger. Lad stå tomt for at springe tilt
      over.
  ha_discovery_switch_app_id:
    name: Applikations-ID for kontakter
    description: >-
      C-Bus app-ID for kontaktgrupper. Lad stå tomt for at springe
      kontaktopdagelse over.
  ha_discovery_trigger_app_id:
    name: Applikations-ID for udløsere
    description: >-
      C-Bus app-ID for udløsergrupper (tastaturer, scener). Almindelig
      værdi: 202. Lad stå tomt for at springe udløseroppdagelse over.
  ha_discovery_scene_enabled:
    name: Aktivér sceneentiteter
    description: >-
      Opret en Home Assistant sceneentitet for hver udløsergruppe, ud
      over hændelses- og knapentiteter. Standard: aktiveret.
  ha_discovery_hvac_app_id:
    name: HVAC applikations-ID
    description: >-
      C-Bus app-ID for HVAC/klimazoner. Standard C-Bus HVAC app: 201.
      Lad stå tomt for at springe HVAC-opdagelse over.
  ha_hvac_temperature_unit:
    name: HVAC temperaturenhed
    description: >-
      Temperaturenhed for HVAC klimaentiteter. C for Celsius, F for
      Fahrenheit. Standard: C.

  # ── Bridge diagnostik ──
  ha_bridge_diagnostics_enabled:
    name: Aktivér bridge-diagnostik
    description: >-
      Publicer bridge-sundhedsentiteter (klar-status, forbindelser,
      kødybde) til Home Assistant. Standard: aktiveret.
  ha_bridge_diagnostics_interval_sec:
    name: Diagnostikinterval (sekunder)
    description: >-
      Hvor ofte bridge-diagnostikstatuser opdateres. Standard: 60.

  # ── Opdagelse af inaktive enheder ──
  stale_device_detection_enabled:
    name: Aktivér opdagelse af inaktive enheder
    description: >-
      Opdag C-Bus enheder der holder op med at rapportere og publicer en
      advarselssensor. Standard: aktiveret.
  stale_device_threshold_hours:
    name: Tærskel for inaktiv enhed (timer)
    description: >-
      Timer uden statusopdatering før en enhed anses for inaktiv.
      Standard: 24.
  stale_device_check_interval_sec:
    name: Kontrolinterval for inaktive enheder (sekunder)
    description: >-
      Hvor ofte der søges efter inaktive enheder. Standard: 3600
      (1 time).

  # ── Avanceret: Forbindelsespool ──
  connection_pool_size:
    name: Forbindelsespoolstørrelse
    description: >-
      Antal parallelle TCP-forbindelser til C-Gate. Forøg for
      højtydende installationer, reducer til 1 for ældre C-Gate.
      Standard: 3.
  connection_health_check_interval_sec:
    name: Sundhedstjekinterval (sekunder)
    description: >-
      Hvor ofte C-Gate forbindelser kontrolleres. Standard: 30.
  connection_keep_alive_interval_sec:
    name: Keep-Alive interval (sekunder)
    description: >-
      Hvor ofte C-Gate forbindelser pinges. Forhindrer stille
      TCP-afbrydelser. Standard: 60.
  cover_ramp_duration_sec:
    name: Afdækningsbevægelsesvarighed (sekunder)
    description: >-
      Forventet tid for en afdækning at åbne/lukke helt. Bridge
      publicerer estimerede positioner i dette vindue. Standard: 5.

  # ── Avanceret: Etikettfil & Web API ──
  cbus_label_file:
    name: Brugerdefineret etikettfil
    description: >-
      Sti til en JSON-fil med brugerdefinerede enhedsnavne. Opdages
      automatisk fra almindelige stier hvis ikke angivet. Filen overvåges
      for ændringer.
  web_api_key:
    name: Web API-nøgle
    description: >-
      API-nøgle til skriveoperationer i etiketredigereren. Indstilles
      når port 8080 eksponeres ud over HA ingress.
  web_allow_unauthenticated_mutations:
    name: Tillad uautentificerede webskrivninger (usikkert)
    description: >-
      Tillad skriveendepunkter uden API-nøgle. Behold deaktiveret
      medmindre du fuldt ud stoler på netværksadgangen til denne
      tilføjelse.
  web_allowed_origins:
    name: Tilladte webkilder (CORS)
    description: >-
      CORS-tilladelsesliste for browseradgang. Indtast fulde
      kildeadresser som https://ha.example.com. Lad stå tomt for at
      deaktivere cross-origin adgang.
  web_mutation_rate_limit_per_minute:
    name: Webskrivningsgrænse
    description: >-
      Maksimalt antal muterende API-forespørgsler per minut per klient.
      Standard: 120.
