configuration:
  # ── 必填字段（始终可见）──
  cgate_mode:
    name: C-Gate 模式
    description: >-
      C-Gate 的提供方式。"remote" 连接到网络上其他位置运行的 C-Gate 服务器
      （最常见）。"managed" 在此附加组件内本地下载并运行 C-Gate。
  cgate_host:
    name: C-Gate 主机（必填）
    description: >-
      C-Gate 服务器的 IP 地址或主机名。远程模式下，输入运行 C-Gate 的机器
      地址。托管模式下，使用 127.0.0.1。
  cgate_project:
    name: C-Gate 项目名称（必填）
    description: >-
      在 C-Gate 中配置的 C-Bus 项目名称（例如 HOME、MYHOUSE）。在 C-Gate
      Toolkit 的项目树中查找。
  ha_discovery_enabled:
    name: 启用 Home Assistant Discovery
    description: >-
      使用 MQTT Discovery 自动向 Home Assistant 注册 C-Bus 设备。大多数
      用户应保持启用。设备将作为实体出现，无需手动 YAML 配置。
  log_level:
    name: 日志级别
    description: >-
      日志详细程度。正常运行使用 "info"，排查连接或发现问题使用 "debug"。

  # ── C-Gate 连接（可选，有合理默认值）──
  cgate_port:
    name: C-Gate 命令端口
    description: >-
      C-Gate 命令连接的 TCP 端口。仅在 C-Gate 使用非标准端口时更改。
      默认：20023。
  cgate_event_port:
    name: C-Gate 事件端口
    description: >-
      C-Gate 事件连接的 TCP 端口。仅在 C-Gate 使用非标准端口时更改。
      默认：20025。

  # ── C-Gate 托管模式 ──
  cgate_install_source:
    name: C-Gate 安装来源
    description: >-
      仅在托管模式下使用。"download" 自动下载 C-Gate。"upload" 查找您
      放置在 /share/cgate/ 中的 zip 文件。
  cgate_download_url:
    name: C-Gate 下载 URL
    description: >-
      仅在使用下载来源的托管模式下使用。如果官方 Clipsal 下载 URL 更改，
      则进行覆盖。留空使用默认 URL。
  cgate_download_sha256:
    name: C-Gate 下载 SHA256
    description: >-
      可选的 SHA256 校验和，用于验证 C-Gate 下载。使用自定义下载 URL 时
      建议使用。

  # ── MQTT（通常自动检测）──
  mqtt_host:
    name: MQTT 代理主机
    description: >-
      从 Mosquitto 附加组件自动检测 - 大多数用户应留空。仅在使用外部
      MQTT 代理时设置。
  mqtt_port:
    name: MQTT 代理端口
    description: >-
      从 Mosquitto 附加组件自动检测。仅为外部代理设置。默认：1883。
  mqtt_username:
    name: MQTT 用户名
    description: >-
      从 Mosquitto 附加组件自动检测。仅为外部代理设置或覆盖凭据。
  mqtt_password:
    name: MQTT 密码
    description: >-
      从 Mosquitto 附加组件自动检测。仅为外部代理设置或覆盖凭据。
  mqtt_use_tls:
    name: 启用 MQTT TLS
    description: >-
      使用 TLS (mqtts://) 连接 MQTT。为要求加密连接的代理启用（通常端口
      8883）。标准 Mosquitto 附加组件不需要。
  mqtt_ca_file:
    name: MQTT CA 证书文件
    description: >-
      用于验证代理 TLS 证书的 CA 证书路径。通常存储在 /ssl/（例如
      /ssl/ca.crt）。仅自签名证书需要。
  mqtt_reject_unauthorized:
    name: 验证 MQTT TLS 证书
    description: >-
      如果无法验证代理的 TLS 证书则拒绝连接。保持启用以确保安全。仅在
      没有 CA 文件的自签名证书时禁用。

  # ── C-Bus 监控 ──
  auto_discover_networks:
    name: 自动发现 C-Bus 网络
    description: >-
      连接时自动从 C-Gate 发现网络 ID。发现的网络用于轮询和 HA Discovery。
      仅在自动发现导致问题时禁用。默认：启用。
  getall_networks:
    name: 监控的 C-Bus 网络
    description: >-
      用于轮询设备状态的 C-Bus 网络 ID。默认：254（大多数安装的标准
      C-Bus 网络）。在 C-Gate Toolkit 的项目树中查找您的网络 ID。
  getall_on_start:
    name: 启动时轮询所有设备
    description: >-
      附加组件启动时请求所有设备状态，将 Home Assistant 与当前 C-Bus
      状态同步。默认：启用。
  getall_period:
    name: 轮询间隔（秒）
    description: >-
      重新轮询所有设备状态的频率。较低的值 = 更新的状态但更多 C-Gate
      流量。默认：3600（1 小时）。
  getall_app_periods:
    name: 按应用的轮询间隔
    description: >-
      覆盖特定 C-Bus 应用的轮询间隔。每个条目有一个 app_id（例如 "201"
      用于 HVAC）和 period_sec（0 表示禁用）。

  # ── MQTT 发布 ──
  retain_reads:
    name: 保留 MQTT 状态消息
    description: >-
      在状态消息上设置 MQTT 保留标志，以便新订阅者立即收到最后已知的
      设备状态。默认：禁用。
  message_interval:
    name: 命令间隔（毫秒）
    description: >-
      发送到 C-Gate 的命令之间的最小延迟。防止快速命令使 C-Gate 过载。
      默认：200ms。

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Discovery 主题前缀
    description: >-
      HA Discovery 消息的 MQTT 主题前缀。必须与您的 Home Assistant
      MQTT Discovery 前缀匹配。默认：homeassistant。
  ha_discovery_networks:
    name: Discovery 网络
    description: >-
      用于设备发现扫描的 C-Bus 网络 ID。如果为空，则使用"监控的 C-Bus
      网络"中的网络。默认：254。
  ha_discovery_cover_app_id:
    name: 窗帘应用程序 ID
    description: >-
      用于窗帘（百叶窗、卷帘、车库门）的 C-Bus 应用 ID。常用值：203
      （Enable Control）。留空以跳过窗帘发现。
  ha_discovery_cover_tilt_app_id:
    name: 窗帘倾斜应用程序 ID
    description: >-
      用于百叶窗倾斜控制的 C-Bus 应用 ID。通过组号与窗帘配对。留空以
      跳过倾斜。
  ha_discovery_switch_app_id:
    name: 开关应用程序 ID
    description: >-
      用于开关组的 C-Bus 应用 ID。留空以跳过开关发现。
  ha_discovery_trigger_app_id:
    name: 触发器应用程序 ID
    description: >-
      用于触发器组（键盘、场景）的 C-Bus 应用 ID。常用值：202。留空以
      跳过触发器发现。
  ha_discovery_scene_enabled:
    name: 启用场景实体
    description: >-
      为每个触发器组创建 Home Assistant 场景实体，除了事件和按钮实体。
      默认：启用。
  ha_discovery_hvac_app_id:
    name: HVAC 应用程序 ID
    description: >-
      用于 HVAC/气候区域的 C-Bus 应用 ID。标准 C-Bus HVAC 应用：201。
      留空以跳过 HVAC 发现。
  ha_hvac_temperature_unit:
    name: HVAC 温度单位
    description: >-
      HVAC 气候实体的温度单位。C 表示摄氏度，F 表示华氏度。默认：C。

  # ── Bridge 诊断 ──
  ha_bridge_diagnostics_enabled:
    name: 启用 Bridge 诊断
    description: >-
      向 Home Assistant 发布 Bridge 健康实体（就绪状态、连接、队列深度）。
      默认：启用。
  ha_bridge_diagnostics_interval_sec:
    name: 诊断间隔（秒）
    description: >-
      Bridge 诊断状态的刷新频率。默认：60。

  # ── 过时设备检测 ──
  stale_device_detection_enabled:
    name: 启用过时设备检测
    description: >-
      检测停止报告的 C-Bus 设备并发布警告传感器。默认：启用。
  stale_device_threshold_hours:
    name: 过时设备阈值（小时）
    description: >-
      设备被视为过时之前没有状态更新的小时数。默认：24。
  stale_device_check_interval_sec:
    name: 过时检查间隔（秒）
    description: >-
      扫描过时设备的频率。默认：3600（1 小时）。

  # ── 高级：连接池 ──
  connection_pool_size:
    name: 连接池大小
    description: >-
      到 C-Gate 的并行 TCP 连接数。高吞吐量安装可增加，旧版 C-Gate 减少
      到 1。默认：3。
  connection_health_check_interval_sec:
    name: 健康检查间隔（秒）
    description: >-
      验证 C-Gate 连接健康状况的频率。默认：30。
  connection_keep_alive_interval_sec:
    name: Keep-Alive 间隔（秒）
    description: >-
      Ping C-Gate 连接的频率。防止静默 TCP 断开。默认：60。
  cover_ramp_duration_sec:
    name: 窗帘升降持续时间（秒）
    description: >-
      窗帘完全打开/关闭的预期时间。Bridge 在此窗口期间发布估计位置。
      默认：5。

  # ── 高级：标签文件和 Web API ──
  cbus_label_file:
    name: 自定义标签文件
    description: >-
      包含自定义设备名称的 JSON 文件路径。如未设置，将从常见路径自动
      检测。文件会被监视以检测更改。
  web_api_key:
    name: Web API 密钥
    description: >-
      标签编辑器中写入操作的 API 密钥。在将端口 8080 暴露到 HA ingress
      之外时设置此项。
  web_allow_unauthenticated_mutations:
    name: 允许未认证的 Web 写入（不安全）
    description: >-
      允许不带 API 密钥的写入端点。除非完全信任对此附加组件的网络访问，
      否则保持禁用。
  web_allowed_origins:
    name: 允许的 Web 来源（CORS）
    description: >-
      用于浏览器访问的 CORS 允许列表。输入完整来源如
      https://ha.example.com。留空以禁用跨域访问。
  web_mutation_rate_limit_per_minute:
    name: Web 写入速率限制
    description: >-
      每个客户端每分钟的最大变更 API 请求数。默认：120。
