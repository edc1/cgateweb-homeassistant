configuration:
  # ── Campos obrigatórios (sempre visíveis) ──
  cgate_mode:
    name: Modo C-Gate
    description: >-
      Como o C-Gate é fornecido. "remote" liga-se a um servidor C-Gate
      noutro local da sua rede (mais comum). "managed" transfere e executa
      o C-Gate localmente dentro deste add-on.
  cgate_host:
    name: Host do C-Gate (obrigatório)
    description: >-
      Endereço IP ou nome de host do seu servidor C-Gate. No modo remoto,
      introduza o endereço da máquina que executa o C-Gate. No modo
      gerenciado, use 127.0.0.1.
  cgate_project:
    name: Nome do Projeto C-Gate (obrigatório)
    description: >-
      O nome do seu projeto C-Bus conforme configurado no C-Gate (ex.:
      HOME, MYHOUSE). Encontre-o no C-Gate Toolkit sob a árvore do
      projeto.
  ha_discovery_enabled:
    name: Ativar Home Assistant Discovery
    description: >-
      Registar automaticamente dispositivos C-Bus no Home Assistant usando
      MQTT Discovery. A maioria dos utilizadores deve deixar isto ativado.
      Os dispositivos aparecem como entidades sem configuração YAML manual.
  log_level:
    name: Nível de Registo
    description: >-
      Verbosidade do registo. Use "info" para operação normal, "debug"
      para resolver problemas de ligação ou descoberta.

  # ── Ligação C-Gate (opcional, com valores predefinidos) ──
  cgate_port:
    name: Porta de Comando do C-Gate
    description: >-
      Porta TCP para ligações de comando do C-Gate. Altere apenas se o
      seu C-Gate usa uma porta não padrão. Predefinido: 20023.
  cgate_event_port:
    name: Porta de Eventos do C-Gate
    description: >-
      Porta TCP para ligações de eventos do C-Gate. Altere apenas se o
      seu C-Gate usa uma porta não padrão. Predefinido: 20025.

  # ── Modo Gerenciado C-Gate ──
  cgate_install_source:
    name: Origem de Instalação do C-Gate
    description: >-
      Usado apenas no modo gerenciado. "download" transfere o C-Gate
      automaticamente. "upload" procura um ficheiro zip que colocou em
      /share/cgate/.
  cgate_download_url:
    name: URL de Transferência do C-Gate
    description: >-
      Usado apenas no modo gerenciado com origem de download. Substitua
      se o URL oficial de download da Clipsal mudar. Deixe vazio para o
      URL predefinido.
  cgate_download_sha256:
    name: SHA256 de Transferência do C-Gate
    description: >-
      Checksum SHA256 opcional para verificar a transferência do C-Gate.
      Recomendado ao usar um URL de transferência personalizado.

  # ── MQTT (geralmente detetado automaticamente) ──
  mqtt_host:
    name: Host do Broker MQTT
    description: >-
      Detetado automaticamente a partir do add-on Mosquitto — a maioria
      dos utilizadores deve deixar vazio. Defina apenas se usar um broker
      MQTT externo.
  mqtt_port:
    name: Porta do Broker MQTT
    description: >-
      Detetado automaticamente a partir do add-on Mosquitto. Defina apenas
      para brokers externos. Predefinido: 1883.
  mqtt_username:
    name: Nome de Utilizador MQTT
    description: >-
      Detetado automaticamente a partir do add-on Mosquitto. Defina apenas
      para brokers externos ou para substituir credenciais.
  mqtt_password:
    name: Palavra-passe MQTT
    description: >-
      Detetado automaticamente a partir do add-on Mosquitto. Defina apenas
      para brokers externos ou para substituir credenciais.
  mqtt_use_tls:
    name: Ativar MQTT TLS
    description: >-
      Ligar ao MQTT usando TLS (mqtts://). Ativar para brokers que
      requerem ligações encriptadas (tipicamente porta 8883). Não
      necessário para o add-on Mosquitto padrão.
  mqtt_ca_file:
    name: Ficheiro de Certificado CA MQTT
    description: >-
      Caminho para o certificado CA para verificar o certificado TLS do
      broker. Geralmente armazenado em /ssl/ (ex.: /ssl/ca.crt). Apenas
      necessário para certificados autoassinados.
  mqtt_reject_unauthorized:
    name: Verificar Certificado TLS MQTT
    description: >-
      Rejeitar ligações se o certificado TLS do broker não puder ser
      verificado. Manter ativado por segurança. Desativar apenas para
      certificados autoassinados sem ficheiro CA.

  # ── Monitorização C-Bus ──
  auto_discover_networks:
    name: Auto-descobrir Redes C-Bus
    description: >-
      Descobrir automaticamente os IDs de rede do C-Gate ao ligar. As
      redes descobertas são usadas para polling e HA Discovery. Desativar
      apenas se a auto-descoberta causar problemas. Predefinido: ativado.
  getall_networks:
    name: Redes C-Bus a Monitorizar
    description: >-
      IDs de rede C-Bus para consultar estados de dispositivos.
      Predefinido: 254 (rede C-Bus padrão para a maioria das instalações).
      Encontre os seus IDs de rede no C-Gate Toolkit sob a árvore do
      projeto.
  getall_on_start:
    name: Consultar Todos os Dispositivos ao Iniciar
    description: >-
      Solicitar todos os estados dos dispositivos quando o add-on inicia,
      sincronizando o Home Assistant com o estado atual do C-Bus.
      Predefinido: ativado.
  getall_period:
    name: Intervalo de Consulta (segundos)
    description: >-
      Com que frequência re-consultar todos os estados dos dispositivos.
      Valores mais baixos = estados mais atualizados mas mais tráfego
      C-Gate. Predefinido: 3600 (1 hora).
  getall_app_periods:
    name: Intervalos de Consulta por Aplicação
    description: >-
      Substituir o intervalo de consulta para aplicações C-Bus específicas.
      Cada entrada tem um app_id (ex.: "201" para HVAC) e period_sec
      (0 para desativar).

  # ── Publicação MQTT ──
  retain_reads:
    name: Reter Mensagens de Estado MQTT
    description: >-
      Definir a flag MQTT retain nas mensagens de estado para que novos
      subscritores recebam imediatamente os últimos estados conhecidos.
      Predefinido: desativado.
  message_interval:
    name: Intervalo de Comandos (ms)
    description: >-
      Atraso mínimo entre comandos enviados ao C-Gate. Evita sobrecarregar
      o C-Gate com comandos rápidos. Predefinido: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Prefixo do Tópico Discovery
    description: >-
      Prefixo do tópico MQTT para mensagens de HA Discovery. Deve
      corresponder ao prefixo de MQTT Discovery do seu Home Assistant.
      Predefinido: homeassistant.
  ha_discovery_networks:
    name: Redes de Discovery
    description: >-
      IDs de rede C-Bus para pesquisar dispositivos. Se vazio, usa as
      redes de "Redes C-Bus a Monitorizar". Predefinido: 254.
  ha_discovery_cover_app_id:
    name: ID de Aplicação de Estores
    description: >-
      ID de app C-Bus para estores (persianas, portadas, portas de
      garagem). Valor comum: 203 (Enable Control). Deixe vazio para
      ignorar a descoberta de estores.
  ha_discovery_cover_tilt_app_id:
    name: ID de Aplicação de Inclinação de Estores
    description: >-
      ID de app C-Bus para controlo de inclinação de persianas venezianas.
      Emparelhado por número de grupo com os estores. Deixe vazio para
      ignorar a inclinação.
  ha_discovery_switch_app_id:
    name: ID de Aplicação de Interruptores
    description: >-
      ID de app C-Bus para grupos de interruptores. Deixe vazio para
      ignorar a descoberta de interruptores.
  ha_discovery_trigger_app_id:
    name: ID de Aplicação de Triggers
    description: >-
      ID de app C-Bus para grupos de triggers (teclados, cenas). Valor
      comum: 202. Deixe vazio para ignorar a descoberta de triggers.
  ha_discovery_scene_enabled:
    name: Ativar Entidades de Cena
    description: >-
      Criar uma entidade de cena do Home Assistant para cada grupo de
      trigger, além das entidades de evento e botão. Predefinido: ativado.
  ha_discovery_hvac_app_id:
    name: ID de Aplicação HVAC
    description: >-
      ID de app C-Bus para zonas HVAC/clima. App HVAC C-Bus padrão: 201.
      Deixe vazio para ignorar a descoberta HVAC.
  ha_hvac_temperature_unit:
    name: Unidade de Temperatura HVAC
    description: >-
      Unidade de temperatura para entidades de clima HVAC. C para Celsius,
      F para Fahrenheit. Predefinido: C.

  # ── Diagnósticos do Bridge ──
  ha_bridge_diagnostics_enabled:
    name: Ativar Diagnósticos do Bridge
    description: >-
      Publicar entidades de saúde do bridge (estado de prontidão,
      ligações, profundidade da fila) no Home Assistant. Predefinido:
      ativado.
  ha_bridge_diagnostics_interval_sec:
    name: Intervalo de Diagnósticos (segundos)
    description: >-
      Com que frequência os estados de diagnóstico do bridge são
      atualizados. Predefinido: 60.

  # ── Deteção de Dispositivos Inativos ──
  stale_device_detection_enabled:
    name: Ativar Deteção de Dispositivos Inativos
    description: >-
      Detetar dispositivos C-Bus que deixam de reportar e publicar um
      sensor de aviso. Predefinido: ativado.
  stale_device_threshold_hours:
    name: Limite de Dispositivo Inativo (horas)
    description: >-
      Horas sem atualização de estado antes de um dispositivo ser
      considerado inativo. Predefinido: 24.
  stale_device_check_interval_sec:
    name: Intervalo de Verificação de Inatividade (segundos)
    description: >-
      Com que frequência procurar dispositivos inativos. Predefinido:
      3600 (1 hora).

  # ── Avançado: Pool de Ligações ──
  connection_pool_size:
    name: Tamanho do Pool de Ligações
    description: >-
      Número de ligações TCP paralelas ao C-Gate. Aumentar para
      instalações de alto débito, reduzir para 1 para C-Gate mais antigo.
      Predefinido: 3.
  connection_health_check_interval_sec:
    name: Intervalo de Verificação de Saúde (segundos)
    description: >-
      Com que frequência verificar se as ligações C-Gate estão saudáveis.
      Predefinido: 30.
  connection_keep_alive_interval_sec:
    name: Intervalo de Keep-Alive (segundos)
    description: >-
      Com que frequência fazer ping às ligações C-Gate. Previne
      desconexões TCP silenciosas. Predefinido: 60.
  cover_ramp_duration_sec:
    name: Duração de Rampa de Estores (segundos)
    description: >-
      Tempo esperado para um estore abrir/fechar completamente. O bridge
      publica posições estimadas durante esta janela. Predefinido: 5.

  # ── Avançado: Ficheiro de Etiquetas & Web API ──
  cbus_label_file:
    name: Ficheiro de Etiquetas Personalizado
    description: >-
      Caminho para um ficheiro JSON com nomes de dispositivos
      personalizados. Detetado automaticamente de caminhos comuns se não
      definido. O ficheiro é vigiado para alterações.
  web_api_key:
    name: Chave Web API
    description: >-
      Chave API para operações de escrita no editor de etiquetas. Defina
      ao expor a porta 8080 para além do HA ingress.
  web_allow_unauthenticated_mutations:
    name: Permitir Escritas Web Não Autenticadas (inseguro)
    description: >-
      Permitir endpoints de escrita sem chave API. Manter desativado a
      menos que confie totalmente no acesso de rede a este add-on.
  web_allowed_origins:
    name: Origens Web Permitidas (CORS)
    description: >-
      Lista de permissões CORS para acesso via navegador. Introduza
      origens completas como https://ha.example.com. Deixe vazio para
      desativar o acesso cross-origin.
  web_mutation_rate_limit_per_minute:
    name: Limite de Escritas Web
    description: >-
      Máximo de pedidos API mutantes por minuto por cliente.
      Predefinido: 120.
