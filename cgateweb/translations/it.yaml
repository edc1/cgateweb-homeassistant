configuration:
  # ── Campi obbligatori (sempre visibili) ──
  cgate_mode:
    name: Modalità C-Gate
    description: >-
      Come viene fornito C-Gate. "remote" si connette a un server C-Gate in
      esecuzione altrove nella rete (più comune). "managed" scarica ed
      esegue C-Gate localmente all'interno di questo componente aggiuntivo.
  cgate_host:
    name: Host C-Gate (obbligatorio)
    description: >-
      Indirizzo IP o nome host del server C-Gate. In modalità remota,
      inserire l'indirizzo della macchina che esegue C-Gate. In modalità
      gestita, usare 127.0.0.1.
  cgate_project:
    name: Nome del progetto C-Gate (obbligatorio)
    description: >-
      Il nome del progetto C-Bus come configurato in C-Gate (ad esempio,
      HOME, MYHOUSE). Trovalo in C-Gate Toolkit sotto l'albero del progetto.
  ha_discovery_enabled:
    name: Abilita Home Assistant Discovery
    description: >-
      Registrare automaticamente i dispositivi C-Bus in Home Assistant
      tramite MQTT Discovery. La maggior parte degli utenti dovrebbe
      lasciarlo abilitato. I dispositivi appaiono come entità senza
      configurazione YAML manuale.
  log_level:
    name: Livello di registrazione
    description: >-
      Livello di dettaglio della registrazione. Usare "info" per il
      funzionamento normale, "debug" per la risoluzione di problemi di
      connessione o discovery.

  # ── Connessione C-Gate (opzionale, valori predefiniti) ──
  cgate_port:
    name: Porta comandi C-Gate
    description: >-
      Porta TCP per le connessioni dei comandi C-Gate. Modificare solo se
      il proprio C-Gate usa una porta non standard. Predefinito: 20023.
  cgate_event_port:
    name: Porta eventi C-Gate
    description: >-
      Porta TCP per le connessioni degli eventi C-Gate. Modificare solo se
      il proprio C-Gate usa una porta non standard. Predefinito: 20025.

  # ── Modalità gestita C-Gate ──
  cgate_install_source:
    name: Fonte di installazione C-Gate
    description: >-
      Utilizzato solo in modalità gestita. "download" scarica C-Gate
      automaticamente. "upload" cerca un file zip posizionato in
      /share/cgate/.
  cgate_download_url:
    name: URL di download di C-Gate
    description: >-
      Utilizzato solo in modalità gestita con fonte di download. Modificare
      se l'URL ufficiale di download Clipsal cambia. Lasciare vuoto per
      l'URL predefinito.
  cgate_download_sha256:
    name: SHA256 del download C-Gate
    description: >-
      Checksum SHA256 opzionale per verificare il download di C-Gate.
      Raccomandato quando si usa un URL di download personalizzato.

  # ── MQTT (di solito rilevato automaticamente) ──
  mqtt_host:
    name: Host del broker MQTT
    description: >-
      Rilevato automaticamente dal componente aggiuntivo Mosquitto — la
      maggior parte degli utenti dovrebbe lasciarlo vuoto. Impostare solo
      se si usa un broker MQTT esterno.
  mqtt_port:
    name: Porta del broker MQTT
    description: >-
      Rilevato automaticamente dal componente aggiuntivo Mosquitto.
      Impostare solo per broker esterni. Predefinito: 1883.
  mqtt_username:
    name: Nome utente MQTT
    description: >-
      Rilevato automaticamente dal componente aggiuntivo Mosquitto.
      Impostare solo per broker esterni o per sovrascrivere le credenziali.
  mqtt_password:
    name: Password MQTT
    description: >-
      Rilevato automaticamente dal componente aggiuntivo Mosquitto.
      Impostare solo per broker esterni o per sovrascrivere le credenziali.
  mqtt_use_tls:
    name: Abilita MQTT TLS
    description: >-
      Connettersi a MQTT usando TLS (mqtts://). Abilitare per broker che
      richiedono connessioni crittografate (tipicamente porta 8883). Non
      necessario per il componente aggiuntivo Mosquitto standard.
  mqtt_ca_file:
    name: File certificato CA MQTT
    description: >-
      Percorso del certificato CA per verificare il certificato TLS del
      broker. Di solito memorizzato in /ssl/ (ad esempio, /ssl/ca.crt).
      Necessario solo per certificati autofirmati.
  mqtt_reject_unauthorized:
    name: Verifica certificato TLS MQTT
    description: >-
      Rifiutare le connessioni se il certificato TLS del broker non può
      essere verificato. Mantenere abilitato per sicurezza. Disabilitare
      solo per certificati autofirmati senza file CA.

  # ── Monitoraggio C-Bus ──
  auto_discover_networks:
    name: Auto-scopri reti C-Bus
    description: >-
      Scoprire automaticamente gli ID di rete da C-Gate alla connessione.
      Le reti scoperte vengono usate per il polling e HA Discovery.
      Disabilitare solo se l'auto-scoperta causa problemi. Predefinito:
      abilitato.
  getall_networks:
    name: Reti C-Bus da monitorare
    description: >-
      ID di rete C-Bus per il polling degli stati dei dispositivi.
      Predefinito: 254 (rete C-Bus standard per la maggior parte delle
      installazioni). Trovare gli ID di rete in C-Gate Toolkit sotto
      l'albero del progetto.
  getall_on_start:
    name: Interroga tutti i dispositivi all'avvio
    description: >-
      Richiedere tutti gli stati dei dispositivi all'avvio del componente
      aggiuntivo, sincronizzando Home Assistant con lo stato attuale di
      C-Bus. Predefinito: abilitato.
  getall_period:
    name: Intervallo di interrogazione (secondi)
    description: >-
      Con quale frequenza ri-interrogare tutti gli stati dei dispositivi.
      Valori più bassi = stati più aggiornati ma più traffico C-Gate.
      Predefinito: 3600 (1 ora).
  getall_app_periods:
    name: Intervalli di interrogazione per applicazione
    description: >-
      Sovrascrivere l'intervallo di interrogazione per applicazioni C-Bus
      specifiche. Ogni voce ha un app_id (ad esempio, "201" per HVAC) e
      period_sec (0 per disabilitare).

  # ── Pubblicazione MQTT ──
  retain_reads:
    name: Conserva messaggi di stato MQTT
    description: >-
      Impostare il flag MQTT retain sui messaggi di stato per far ricevere
      ai nuovi sottoscrittori immediatamente gli ultimi stati noti.
      Predefinito: disabilitato.
  message_interval:
    name: Intervallo comandi (ms)
    description: >-
      Ritardo minimo tra i comandi inviati a C-Gate. Impedisce di
      sovraccaricare C-Gate con comandi rapidi. Predefinito: 200ms.

  # ── Home Assistant Discovery ──
  ha_discovery_prefix:
    name: Prefisso del tema Discovery
    description: >-
      Prefisso del tema MQTT per i messaggi HA Discovery. Deve
      corrispondere al prefisso MQTT Discovery del proprio Home Assistant.
      Predefinito: homeassistant.
  ha_discovery_networks:
    name: Reti Discovery
    description: >-
      ID di rete C-Bus da scansionare per il rilevamento dei dispositivi.
      Se vuoto, usa le reti da "Reti C-Bus da monitorare". Predefinito: 254.
  ha_discovery_cover_app_id:
    name: ID applicazione per coperture
    description: >-
      ID app C-Bus per coperture (tapparelle, persiane, porte del garage).
      Valore comune: 203 (Enable Control). Lasciare vuoto per saltare il
      rilevamento delle coperture.
  ha_discovery_cover_tilt_app_id:
    name: ID applicazione per inclinazione coperture
    description: >-
      ID app C-Bus per il controllo dell'inclinazione delle veneziane.
      Abbinato per numero di gruppo alle coperture. Lasciare vuoto per
      saltare l'inclinazione.
  ha_discovery_switch_app_id:
    name: ID applicazione per interruttori
    description: >-
      ID app C-Bus per gruppi di interruttori. Lasciare vuoto per saltare
      il rilevamento degli interruttori.
  ha_discovery_trigger_app_id:
    name: ID applicazione per trigger
    description: >-
      ID app C-Bus per gruppi di trigger (tastiere, scene). Valore
      comune: 202. Lasciare vuoto per saltare il rilevamento dei trigger.
  ha_discovery_scene_enabled:
    name: Abilita entità scena
    description: >-
      Creare un'entità scena di Home Assistant per ogni gruppo trigger,
      oltre alle entità evento e pulsante. Predefinito: abilitato.
  ha_discovery_hvac_app_id:
    name: ID applicazione HVAC
    description: >-
      ID app C-Bus per zone HVAC/clima. App HVAC C-Bus standard: 201.
      Lasciare vuoto per saltare il rilevamento HVAC.
  ha_hvac_temperature_unit:
    name: Unità di temperatura HVAC
    description: >-
      Unità di temperatura per le entità clima HVAC. C per Celsius, F per
      Fahrenheit. Predefinito: C.

  # ── Diagnostica del bridge ──
  ha_bridge_diagnostics_enabled:
    name: Abilita diagnostica del bridge
    description: >-
      Pubblicare entità di salute del bridge (stato di pronto, connessioni,
      profondità della coda) in Home Assistant. Predefinito: abilitato.
  ha_bridge_diagnostics_interval_sec:
    name: Intervallo di diagnostica (secondi)
    description: >-
      Con quale frequenza vengono aggiornati gli stati di diagnostica del
      bridge. Predefinito: 60.

  # ── Rilevamento dispositivi inattivi ──
  stale_device_detection_enabled:
    name: Abilita rilevamento dispositivi inattivi
    description: >-
      Rilevare i dispositivi C-Bus che smettono di rispondere e pubblicare
      un sensore di avviso. Predefinito: abilitato.
  stale_device_threshold_hours:
    name: Soglia dispositivo inattivo (ore)
    description: >-
      Ore senza aggiornamento di stato prima che un dispositivo sia
      considerato inattivo. Predefinito: 24.
  stale_device_check_interval_sec:
    name: Intervallo di controllo inattività (secondi)
    description: >-
      Con quale frequenza cercare dispositivi inattivi. Predefinito: 3600
      (1 ora).

  # ── Avanzato: Pool di connessioni ──
  connection_pool_size:
    name: Dimensione del pool di connessioni
    description: >-
      Numero di connessioni TCP parallele a C-Gate. Aumentare per
      installazioni ad alto throughput, ridurre a 1 per C-Gate più vecchi.
      Predefinito: 3.
  connection_health_check_interval_sec:
    name: Intervallo di verifica salute (secondi)
    description: >-
      Con quale frequenza verificare che le connessioni C-Gate siano
      sane. Predefinito: 30.
  connection_keep_alive_interval_sec:
    name: Intervallo Keep-Alive (secondi)
    description: >-
      Con quale frequenza fare ping alle connessioni C-Gate. Previene
      disconnessioni TCP silenziose. Predefinito: 60.
  cover_ramp_duration_sec:
    name: Durata rampa coperture (secondi)
    description: >-
      Tempo previsto per l'apertura/chiusura completa di una copertura.
      Il bridge pubblica posizioni stimate durante questa finestra.
      Predefinito: 5.

  # ── Avanzato: File di etichette e Web API ──
  cbus_label_file:
    name: File di etichette personalizzato
    description: >-
      Percorso di un file JSON con nomi di dispositivi personalizzati.
      Rilevato automaticamente dai percorsi comuni se non impostato. Il
      file viene monitorato per le modifiche.
  web_api_key:
    name: Chiave Web API
    description: >-
      Chiave API per operazioni di scrittura nell'editor di etichette.
      Impostare quando la porta 8080 è esposta oltre HA ingress.
  web_allow_unauthenticated_mutations:
    name: Consenti scritture web non autenticate (non sicuro)
    description: >-
      Consentire endpoint di scrittura senza chiave API. Mantenere
      disabilitato a meno che non ci si fidi completamente dell'accesso
      di rete a questo componente aggiuntivo.
  web_allowed_origins:
    name: Origini web consentite (CORS)
    description: >-
      Lista CORS consentita per l'accesso dal browser. Inserire origini
      complete come https://ha.example.com. Lasciare vuoto per disabilitare
      l'accesso cross-origin.
  web_mutation_rate_limit_per_minute:
    name: Limite di scritture web
    description: >-
      Massimo di richieste API mutanti per minuto per client.
      Predefinito: 120.
